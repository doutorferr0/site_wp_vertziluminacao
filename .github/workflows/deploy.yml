name: Deploy tema pra Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Composer (Carbon Fields → vendor/)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HOSTINGER_PORT }}" -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync tema → Hostinger
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HOSTINGER_PORT }}" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude '.oxlintrc.json' \
            --exclude 'node_modules' \
            --exclude 'assets/images/' \
            --exclude 'package.json' \
            --exclude 'composer.json' \
            --exclude 'composer.lock' \
            ./ "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}/"

# Secrets necessários (Settings → Secrets and variables → Actions):
#   HOSTINGER_HOST     — IP/host SSH do plano (hPanel → Avançado → SSH)
#   HOSTINGER_PORT     — porta SSH (Hostinger usa 65002)
#   HOSTINGER_USER     — usuário SSH (uXXXXXXXXX)
#   HOSTINGER_SSH_KEY  — chave privada ed25519 (par criado pra deploy)
#   HOSTINGER_PATH     — domains/vertziluminacao.com/public_html/wp-content/themes/tema-vertz
#
# Notas:
# - assets/images/ excluído do rsync E protegido do --delete (rsync não
#   apaga excluídos no destino) — imagens sobem via SFTP manual.
# - vendor/ vai junto (gerado no build, não no Git).
